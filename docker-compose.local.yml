volumes:
  redis_data:
  postgres_data:

services:
  postgres:
    extends:
      file: ./docker-compose.yml
      service: postgres
    container_name: staff-focus-postgres-local
    ports:
      - "5433:5432"
    networks:
      - app-network

  redis:
    extends:
      file: ./docker-compose.yml
      service: redis
    container_name: staff-focus-redis-local
    networks:
      - app-network

  staff-focus-app:
    extends:
      file: docker-compose.yml
      service: staff-focus-app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.debug
      args:
        VITE_API_SECRET_KEY: ${VITE_API_SECRET_KEY}
        VITE_OUTLINE_BASE_URL: ${VITE_OUTLINE_BASE_URL}
    container_name: staff-focus-app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-staff_focus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-staff_focus}
    ports:
      - "${PORT}:${PORT}"
      - "5175:5175"
      - "9229:9229"
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
      - ./server.js:/app/server.js
      - ./vite.config.debug.ts:/app/vite.config.debug.ts
      - ./package.json:/app/package.json
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./tsconfig.json:/app/tsconfig.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
      - ./prisma:/app/prisma
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT}/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["npm", "run", "hot-reload"]

networks:
  app-network:
    driver: bridge
