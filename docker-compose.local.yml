volumes:
  redis_data:
  postgres_data:

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik-local
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
    networks:
      - traefik-network

  postgres:
    extends:
      file: ./docker-compose.yml
      service: postgres
    container_name: staff-focus-postgres-local
    ports:
      - "5432:5432"
    networks:
      - traefik-network

  redis:
    extends:
      file: ./docker-compose.yml
      service: redis
    container_name: staff-focus-redis-local
    networks:
      - traefik-network

  staff-focus-app:
    extends:
      file: docker-compose.yml
      service: staff-focus-app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.debug
      args:
        VITE_API_SECRET_KEY: ${VITE_API_SECRET_KEY}
        VITE_OUTLINE_BASE_URL: ${VITE_OUTLINE_BASE_URL}
    container_name: staff-focus-app
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.staff-focus-app.rule=Host(`${HOST}`)"
      - "traefik.http.routers.staff-focus-app.entrypoints=websecure"
      - "traefik.http.routers.staff-focus-app.tls=true"
      - "traefik.http.services.staff-focus-app.loadbalancer.server.port=${PORT}"
    ports:
      - "${PORT}:${PORT}"
      - "5173:5173" # Vite dev server port
      - "9229:9229" # Node.js debug port
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
      - ./server.js:/app/server.js
      - ./vite.config.debug.ts:/app/vite.config.debug.ts
      - ./package.json:/app/package.json
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./tsconfig.json:/app/tsconfig.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT}/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["npm", "run", "hot-reload"]

  ngrok:
    image: ngrok/ngrok:latest
    container_name: staff-focus-ngrok
    command: http staff-focus-app:${PORT} --log=stdout --log-level=info
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    networks:
      - traefik-network
    restart: unless-stopped

  webhook-setup:
    build: .
    container_name: staff-focus-webhook-setup
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./scripts:/app/scripts
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    entrypoint: []
    command: node scripts/setup-telegram-webhook.js
    depends_on:
      - ngrok
    networks:
      - traefik-network

networks:
  traefik-network:
    driver: bridge 