name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (dev/prod)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      branch:
        description: 'Branch being deployed'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=${{ inputs.environment }}-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            SHORT_HASH=${{ github.sha }}
            COMMIT_TIME=${{ github.event.head_commit.timestamp || '' }}
            BUILD_TIME=${{ github.run_id }}
            VITE_API_SECRET_KEY=${{ secrets.VITE_API_SECRET_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_OUTLINE_BASE_URL=${{ secrets.VITE_OUTLINE_BASE_URL }}
            VITE_FRAPPE_BASE_URL=${{ secrets.VITE_FRAPPE_BASE_URL }}
            VITE_TG_BOT_USERNAME=${{ secrets.VITE_TG_BOT_USERNAME }}
            YANDEX_TREKER_AUTH_TOKEN=${{ secrets.YANDEX_TREKER_AUTH_TOKEN }}
            X_ORG_ID=${{ secrets.X_ORG_ID }}

      - name: Output image info
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}"
          echo "Also tagged as: ghcr.io/${{ github.repository }}:${{ inputs.environment }}-latest"
