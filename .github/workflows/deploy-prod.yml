name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set variables
        id: vars
        run: |
          SHORT_HASH=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=prod-${SHORT_HASH}" >> $GITHUB_OUTPUT
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:prod-latest
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            SHORT_HASH=${{ steps.vars.outputs.short_hash }}
            COMMIT_TIME=${{ github.event.head_commit.timestamp }}
            BUILD_TIME=${{ github.run_id }}
            VITE_API_SECRET_KEY=${{ secrets.VITE_API_SECRET_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_OUTLINE_BASE_URL=${{ secrets.VITE_OUTLINE_BASE_URL }}
            VITE_FRAPPE_BASE_URL=${{ secrets.VITE_FRAPPE_BASE_URL }}
            VITE_TG_BOT_USERNAME=${{ secrets.VITE_TG_BOT_USERNAME }}
            YANDEX_TREKER_AUTH_TOKEN=${{ secrets.YANDEX_TREKER_AUTH_TOKEN }}
            X_ORG_ID=${{ secrets.X_ORG_ID }}

      - name: Output image info
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.image_tag }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set deployment variables
        run: |
          echo "DEPLOY_PATH=${{ vars.DEPLOY_PATH }}" >> $GITHUB_ENV
          echo "SSH_USER=${{ vars.SSH_USER }}" >> $GITHUB_ENV
          echo "SSH_HOST=${{ vars.SSH_HOST }}" >> $GITHUB_ENV
          echo "DOMAIN=${{ vars.DOMAIN }}" >> $GITHUB_ENV
          echo "SHORT_HASH=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ needs.build.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Debug connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.SSH_USER }}@${{ env.SSH_HOST }} 'echo "SSH connection successful"'

      - name: Sync compose files to server
        run: |
          rsync -avz \
            --include='docker-compose.ghcr.yml' \
            --include='docker-compose.yml' \
            --include='docker-compose.prod.yml' \
            --exclude='*' \
            --rsync-path="sudo rsync" \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            echo "🚀 Начинаем деплой Portal..."

            cd ${{ env.DEPLOY_PATH }}

            if [ ! -f .env ]; then
              echo "❌ Ошибка: .env файл не найден!"
              exit 1
            fi

            # Update VERSION and IMAGE_TAG in .env
            SHORT_HASH="${{ env.SHORT_HASH }}"
            BRANCH="${{ github.event.inputs.branch }}"
            sudo sed -i '/^VERSION=/d' .env
            sudo sed -i '/^SHOW_VERSION=/d' .env
            sudo sed -i '/^IMAGE_TAG=/d' .env
            echo "VERSION=${BRANCH}@${SHORT_HASH}" | sudo tee -a .env > /dev/null
            echo "SHOW_VERSION=false" | sudo tee -a .env > /dev/null
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" | sudo tee -a .env > /dev/null
            echo "📝 Set VERSION=${BRANCH}@${SHORT_HASH}, IMAGE_TAG=${{ env.IMAGE_TAG }}"

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📦 Pulling image from GHCR..."
            sudo docker compose -f docker-compose.ghcr.yml pull staff-focus-app

            echo "🛑 Останавливаем текущие контейнеры..."
            sudo docker compose -f docker-compose.ghcr.yml down || sudo docker compose -f docker-compose.prod.yml down || true

            echo "🚀 Запускаем Portal..."
            sudo docker compose -f docker-compose.ghcr.yml up -d

            echo "⏳ Ждем запуска приложения..."
            sleep 15

            echo "📊 Статус контейнеров:"
            sudo docker compose -f docker-compose.ghcr.yml ps

            echo "🧹 Очищаем старые образы..."
            sudo docker image prune -f

            echo "✅ Деплой Portal завершен!"
          EOF
